name: Build ECR Image and Trivy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: nkpdemo/project1

jobs:
  lint:
    name: Run Unit Testing
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Image
      run:  docker build -t pythonapp:latest .

    # - name: Scan with Trivy
    #   uses: aquasecurity/trivy-action@master
    #   with: 
    #     image-ref: pythonapp:latest
    #     exit-code: 1
    #     severity: HIGH,CRITICAL

    - name: Push Image 
      run: | 
        docker tag pythonapp:latest ${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:latest
        docker push ${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:latest